version: "3.8"

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: yukkos_web_dev
    restart: always
    command: npm run dev
    ports:
      - "5173:5173"
    volumes:
      - ./:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:3000/api/v1
